name: Build & Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/frontend/package-lock.json

      - name: Build with Maven
        run: chmod +x mvnw && ./mvnw -B -DskipTests clean install

      - name: Deploy to Koyeb
        if: success()
        run: |
          curl -s -X POST "${{ secrets.KOYEB_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail
        continue-on-error: true

# To enable auto-deploy to Koyeb:
# 1. Create app on koyeb.com → connect GitHub repo → copy Deploy Hook URL from Settings
# 2. Go to GitHub repo → Settings → Secrets → Actions → New secret
# 3. Name: KOYEB_DEPLOY_HOOK
# 4. Value: your Koyeb deploy hook URL
