databaseChangeLog:
  - changeSet:
      id: 1-create-contact-submissions
      author: khaled
      changes:
        - createTable:
            tableName: contact_submissions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: subject
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: received_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: ip_address
                  type: VARCHAR(45)
