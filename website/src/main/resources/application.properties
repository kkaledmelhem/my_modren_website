spring.application.name=website
server.port=8080
server.servlet.context-path=/

# Serve React SPA static files
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

logging.level.com.khaledmelhem.website=INFO

groq.api.key=${GROQ_API_KEY:}

# Redis
# On Railway: REDIS_URL = redis://default:pass@host:port
# On Upstash: REDIS_URL = rediss://default:pass@host:6380  (SSL, double-s)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# PostgreSQL
# On Railway: uses individual vars (PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD)
# On Neon/Render: uses DATABASE_URL directly (jdbc:postgresql://...?sslmode=require)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:portfolio}}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}

# SSL for Neon (ignored by non-SSL connections)
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:prefer}

# Actuator health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true
