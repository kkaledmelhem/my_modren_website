spring.application.name=website
server.port=8080
server.servlet.context-path=/

# Serve React SPA static files
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

logging.level.com.khaledmelhem.website=INFO

groq.api.key=${GROQ_API_KEY:}

# Redis (Railway injects REDIS_URL)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# PostgreSQL — Railway provides PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:portfolio}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}

# Actuator health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.health.db.enabled=true
